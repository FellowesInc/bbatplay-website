  <text class="st2"><tspan x="960" y="568.8" xml:space="preserve">      &lt;!-- Our Products Section --&gt;</tspan><tspan x="960" y="583.2" xml:space="preserve">      &lt;section class=&quot;our-products-section pb-5&quot;&gt;</tspan><tspan x="960" y="597.6" xml:space="preserve">        &lt;h2 class=&quot;section-title ap-color-red text-center mb-4 mb-lg-5&quot;&gt;Our Products Are&lt;/h2&gt;</tspan><tspan x="960" y="612" xml:space="preserve">        &lt;div class=&quot;three-col-wavy-row position-relative&quot;&gt;</tspan><tspan x="960" y="626.4" xml:space="preserve">          &lt;div class=&quot;wavy-column red-wavy-column ap-bg-red&quot;&gt;</tspan><tspan x="960" y="640.8" xml:space="preserve">            &lt;div class=&quot;wavy-column-content text-center&quot;&gt;</tspan><tspan x="960" y="655.2" xml:space="preserve">              &lt;h3 class=&quot;section-title text-white mb-2 mb-lg-4&quot;&gt;Engaging&lt;/h3&gt;</tspan><tspan x="960" y="669.6" xml:space="preserve">              &lt;p class=&quot;wavy-setction-text text-white&quot;&gt;</tspan><tspan x="960" y="684" xml:space="preserve">                They foster imaginative play, offers hands on learning, and help to reduce screen time for children.</tspan><tspan x="960" y="698.4" xml:space="preserve">              &lt;/p&gt;</tspan><tspan x="960" y="712.8" xml:space="preserve">            &lt;/div&gt;</tspan><tspan x="960" y="727.2" xml:space="preserve">            &lt;div class=&quot;wave-svg-wrapper&quot;&gt;</tspan><tspan x="960" y="741.6" xml:space="preserve">              &lt;?xml version=&quot;1.0&quot; encoding=&quot;UTF-8&quot;?&gt;</tspan><tspan x="960" y="756" xml:space="preserve">              &lt;svg id=&quot;Layer_1&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; version=&quot;1.1&quot; viewBox=&quot;0 0 768 120.1&quot;&gt;</tspan><tspan x="960" y="770.4" xml:space="preserve">                &lt;!-- Generator: Adobe Illustrator 30.2.1, SVG Export Plug-In . SVG Version: 2.1.1 Build 1)  --&gt;</tspan><tspan x="960" y="784.8" xml:space="preserve">                &lt;path class=&quot;st0&quot; d=&quot;M0,40.9v79.2h768V40.9s-160.8-103.5-370.4,18.6C153.9,201.4,0,40.9,0,40.9&quot;/&gt;</tspan><tspan x="960" y="799.2" xml:space="preserve">              &lt;/svg&gt;</tspan><tspan x="960" y="813.6" xml:space="preserve">            &lt;/div&gt;</tspan><tspan x="960" y="828" xml:space="preserve">          &lt;/div&gt;</tspan><tspan x="960" y="842.4" xml:space="preserve">          &lt;div class=&quot;wavy-column green-wavy-column ap-bg-green&quot;&gt;</tspan><tspan x="960" y="856.8" xml:space="preserve">            &lt;div class=&quot;wavy-column-content text-center&quot;&gt;</tspan><tspan x="960" y="871.2" xml:space="preserve">              &lt;h3 class=&quot;section-title text-white mb-2 mb-lg-4&quot;&gt;Collaborative&lt;/h3&gt;</tspan><tspan x="960" y="885.6" xml:space="preserve">              &lt;p class=&quot;wavy-setction-text text-white&quot;&gt;</tspan><tspan x="960" y="900" xml:space="preserve">                They promote families and groups of kids to play while building social skills like sharing and working together to create something.</tspan><tspan x="960" y="914.4" xml:space="preserve">              &lt;/p&gt;</tspan><tspan x="960" y="928.8" xml:space="preserve">            &lt;/div&gt;</tspan><tspan x="960" y="943.2" xml:space="preserve">            &lt;div class=&quot;wave-svg-wrapper&quot;&gt;</tspan><tspan x="960" y="957.6" xml:space="preserve">              &lt;?xml version=&quot;1.0&quot; encoding=&quot;UTF-8&quot;?&gt;</tspan><tspan x="960" y="972" xml:space="preserve">              &lt;svg id=&quot;Layer_1&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; version=&quot;1.1&quot; viewBox=&quot;0 0 768 120.1&quot;&gt;</tspan><tspan x="960" y="986.4" xml:space="preserve">                &lt;!-- Generator: Adobe Illustrator 30.2.1, SVG Export Plug-In . SVG Version: 2.1.1 Build 1)  --&gt;</tspan><tspan x="960" y="1000.8" xml:space="preserve">                &lt;path class=&quot;st1&quot; d=&quot;M0,40.9v79.2h768V40.9s-160.8-103.5-370.4,18.6C153.9,201.4,0,40.9,0,40.9&quot;/&gt;</tspan><tspan x="960" y="1015.2" xml:space="preserve">              &lt;/svg&gt;</tspan><tspan x="960" y="1029.6" xml:space="preserve">            &lt;/div&gt;          </tspan><tspan x="960" y="1044" xml:space="preserve">          &lt;/div&gt;</tspan><tspan x="960" y="1058.4" xml:space="preserve">          &lt;div class=&quot;wavy-column yellow-wavy-column ap-bg-yellow&quot;&gt;</tspan><tspan x="960" y="1072.8" xml:space="preserve">            &lt;div class=&quot;wavy-column-content text-center&quot;&gt;</tspan><tspan x="960" y="1087.2" xml:space="preserve">              &lt;h3 class=&quot;section-title text-white mb-2 mb-lg-4&quot;&gt;Sustainable &amp; Economical&lt;/h3&gt;</tspan><tspan x="960" y="1101.6" xml:space="preserve">              &lt;p class=&quot;wavy-setction-text text-white&quot;&gt;</tspan><tspan x="960" y="1116" xml:space="preserve">                Our products are cost effective, recyclable, and reusable. </tspan><tspan x="960" y="1130.4" xml:space="preserve">              &lt;/p&gt;</tspan><tspan x="960" y="1144.8" xml:space="preserve">            &lt;/div&gt;</tspan><tspan x="960" y="1159.2" xml:space="preserve">            &lt;div class=&quot;wave-svg-wrapper&quot;&gt;</tspan><tspan x="960" y="1173.6" xml:space="preserve">              &lt;?xml version=&quot;1.0&quot; encoding=&quot;UTF-8&quot;?&gt;</tspan><tspan x="960" y="1188" xml:space="preserve">              &lt;svg id=&quot;Layer_1&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; version=&quot;1.1&quot; viewBox=&quot;0 0 768 120.1&quot;&gt;</tspan><tspan x="960" y="1202.4" xml:space="preserve">                &lt;!-- Generator: Adobe Illustrator 30.2.1, SVG Export Plug-In . SVG Version: 2.1.1 Build 1)  --&gt;</tspan><tspan x="960" y="1216.8" xml:space="preserve">                &lt;path class=&quot;st2&quot; d=&quot;M0,40.9v79.2h768V40.9s-160.8-103.5-370.4,18.6C153.9,201.4,0,40.9,0,40.9&quot;/&gt;</tspan><tspan x="960" y="1231.2" xml:space="preserve">              &lt;/svg&gt;</tspan><tspan x="960" y="1245.6" xml:space="preserve">            &lt;/div&gt;              </tspan><tspan x="960" y="1260" xml:space="preserve">          &lt;/div&gt;</tspan><tspan x="960" y="1274.4" xml:space="preserve">        &lt;/div&gt;</tspan><tspan x="960" y="1288.8" xml:space="preserve">        &lt;div class=&quot;ap-bg-blue pt-5 pb-4 pb-lg-5&quot;&gt;</tspan><tspan x="960" y="1303.2" xml:space="preserve">          &lt;div class=&quot;wrapper-sm px-4&quot;&gt;</tspan><tspan x="960" y="1317.6" xml:space="preserve">            &lt;div class=&quot;row&quot;&gt;</tspan><tspan x="960" y="1332" xml:space="preserve">              &lt;div class=&quot;col-12 px-4&quot;&gt;</tspan><tspan x="960" y="1346.4" xml:space="preserve">                &lt;h2 class=&quot;small-subtext text-center ap-color-med-yellow mb-4 mb-lg-5&quot;&gt;</tspan><tspan x="960" y="1360.8" xml:space="preserve">                  Our interactive playhouses &amp; building blocks Encourage social &amp; cognitive skills in a Fun and creative way!</tspan><tspan x="960" y="1375.2" xml:space="preserve">                &lt;/h2&gt;</tspan><tspan x="960" y="1389.6" xml:space="preserve">              &lt;/div&gt;</tspan><tspan x="960" y="1404" xml:space="preserve">            &lt;/div&gt;</tspan><tspan x="960" y="1418.4" xml:space="preserve">            &lt;div class=&quot;row g-3 g-lg-4 text-center&quot;&gt;</tspan><tspan x="960" y="1432.8" xml:space="preserve">              &lt;div class=&quot;col-12 col-lg-6&quot;&gt;</tspan><tspan x="960" y="1447.2" xml:space="preserve">                &lt;img src=&quot;/img/about-us/our-products-img-1.jpg&quot; alt=&quot;two small girls coloring on the side of a cardboard playhouse&quot; class=&quot;our-prod-img&quot;&gt;</tspan><tspan x="960" y="1461.6" xml:space="preserve">                &lt;p class=&quot;our-prod-text text-white text-center&quot;&gt;</tspan><tspan x="960" y="1476" xml:space="preserve">                  Our products encourage children to learn social skills such as taking tuns and sharing with others.</tspan><tspan x="960" y="1490.4" xml:space="preserve">                &lt;/p&gt;</tspan><tspan x="960" y="1504.8" xml:space="preserve">              &lt;/div&gt;</tspan><tspan x="960" y="1519.2" xml:space="preserve">              &lt;div class=&quot;col-12 col-lg-6&quot;&gt;</tspan><tspan x="960" y="1533.6" xml:space="preserve">                &lt;img src=&quot;./img/about-us/our-products-img-2.jpg&quot; alt=&quot;two small boys playing with cardboard blocks and a ball to knock them down&quot; class=&quot;our-prod-img&quot;&gt;</tspan><tspan x="960" y="1548" xml:space="preserve">                &lt;p class=&quot;our-prod-text text-white text-center&quot;&gt;</tspan><tspan x="960" y="1562.4" xml:space="preserve">                  Our products strengthen children&apos;s cognitive skills through decision making, organizing, and creating.</tspan><tspan x="960" y="1576.8" xml:space="preserve">                &lt;/p&gt;</tspan><tspan x="960" y="1591.2" xml:space="preserve">              &lt;/div&gt;</tspan><tspan x="960" y="1605.6" xml:space="preserve">            &lt;/div&gt;</tspan><tspan x="960" y="1620" xml:space="preserve">          &lt;/div&gt;</tspan><tspan x="960" y="1634.4" xml:space="preserve">        &lt;/div&gt;</tspan><tspan x="960" y="1648.8" xml:space="preserve">      &lt;/section&gt;</tspan></text>
